<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Blood Loot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <!-- Design resolution root: all layout is 1920×1080; scaled to fit viewport for consistent look on any device -->
  <div id="app">
  <div id="wrap"><canvas id="game"></canvas></div>
  <div id="vignette"></div>

  <div id="hud">
    <div id="hudTL" class="hudCard">
      <div class="row">
        <div class="tag"><span>🧪</span><span id="tTag" class="mono">00:00</span></div>
        <div class="tag"><span>💀</span><span id="kTag" class="mono">0</span></div>
        <div class="tag"><span>📦</span><span id="lTag" class="mono">0</span></div>
      </div>
      <div class="barWrap">
        <div>
          <div class="row"><span class="tiny">HP</span><span class="tiny mono" id="hpTxt">100/100</span></div>
          <div class="bar"><div id="hpFill" class="fill hp"></div></div>
        </div>
        <div>
          <div class="row"><span class="tiny">Shield</span><span class="tiny mono" id="shTxt">0/0</span></div>
          <div class="bar"><div id="shFill" class="fill sh"></div></div>
        </div>
        <div>
          <div class="row"><span class="tiny">XP</span><span class="tiny mono" id="xpTxt">0/20</span></div>
          <div class="bar"><div id="xpFill" class="fill xp"></div></div>
        </div>
        <div>
          <div class="row"><span class="tiny">Token</span><span class="tiny mono" id="tokenTxt">0/1000</span></div>
          <div class="bar"><div id="tokenFill" class="fill token"></div></div>
        </div>
      </div>
      <div id="hudQuestStatus" class="hudQuestStatus" style="margin-top:8px; padding:8px 10px; background:rgba(0,0,0,0.4); border-radius:8px; font-size:12px; color:rgba(234,242,255,0.95); min-height:48px;" aria-live="polite"></div>
    </div>

  </div>

  <div id="toast"></div>
  <div id="bossBanner">⚠️ BOSS APPROACHING! ⚠️</div>

  <div id="overlay">
    <div id="overlayCard">
      <div id="ovHead">
        <div>
          <h2 id="ovTitle">Blood Loot</h2>
          <span id="gameVersion" class="gameVersion"></span>
          <p id="ovSub">Collect blood • fill ampules • extract to base</p>
        </div>
        <div id="ovBtns"></div>
      </div>
      <div id="ovBody"></div>
    </div>
  </div>

  <!-- Inventory overlay: character panel (left) | inventory panel (center) | stats panel (right). Open with I. -->
  <div id="inventoryOverlay" class="inventoryOverlay hidden" aria-hidden="true">
    <div class="inventoryOverlayRow">
      <div id="inventoryCharacterPanel" class="inventoryCharacterPanel">
        <div class="inventoryCharacterTitle">Character</div>
        <div class="inventoryFigureWrap">
          <div class="inventoryFigure" id="inventoryFigure">
            <!-- Vitruvian cat: drag-and-drop slots. Filled by JS. -->
            <div class="invSlot invSlotHead" data-slot="head" title="Head"></div>
            <div class="invSlot invSlotNeck" data-slot="jewel" title="Neck"></div>
            <div class="invSlot invSlotArmor" data-slot="armor" title="Armor"></div>
            <div class="invSlot invSlotWeapon" data-slot="weapon" title="Weapon"></div>
            <div class="invSlot invSlotRing1" data-slot="ring1" title="Ring 1"></div>
            <div class="invSlot invSlotRing2" data-slot="ring2" title="Ring 2"></div>
            <div class="invSlot invSlotFeet" data-slot="feet" title="Feet"></div>
          </div>
        </div>
      </div>
      <div class="inventoryPanel">
        <div class="inventoryHeader">
          <h2 class="inventoryTitle">Inventory</h2>
          <span class="inventoryHint"><span class="keycap">I</span> close</span>
        </div>
        <div class="inventoryGridWrap">
          <div class="inventoryGridLabel">Backpack</div>
          <div class="inventoryGrid" id="inventoryGrid"></div>
        </div>
        <div class="invScrapWrap">
          <div class="inventoryGridLabel">Scrap</div>
          <div id="inventoryScrapDrop" class="invScrapDrop" title="Drop item to scrap">🔧</div>
          <div id="inventoryScrapHint" class="invScrapHint">Drop item to scrap</div>
        </div>
      </div>
      <div id="inventoryStatsPanel" class="inventoryStatsPanel"></div>
    </div>
    <div id="inventoryScrapConfirm" class="invScrapConfirm hidden" aria-hidden="true">
      <div class="invScrapConfirmCard" role="dialog" aria-labelledby="inventoryScrapConfirmTitle">
        <div id="inventoryScrapConfirmTitle" class="invScrapConfirmTitle"></div>
        <div id="inventoryScrapConfirmBody" class="invScrapConfirmBody"></div>
        <div class="invScrapConfirmFooter">
          <div id="inventoryScrapEquippedWarn" class="invScrapEquippedWarn hidden" title="Removes this piece from your character">
            <svg class="invScrapWarnSvg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 48" width="38" height="32" aria-hidden="true" focusable="false">
              <polygon points="28,2 54,46 2,46" fill="#d32f2f" stroke="#ff8a80" stroke-width="1.2" stroke-linejoin="round"/>
              <text x="28" y="40" text-anchor="middle" fill="#fff" font-size="22" font-weight="900" font-family="system-ui,Segoe UI,sans-serif">!</text>
            </svg>
          </div>
          <div class="invScrapConfirmBtns">
            <button type="button" class="invScrapConfirmBtn invScrapConfirmYes" id="inventoryScrapConfirmYes">Confirm</button>
            <button type="button" class="invScrapConfirmBtn invScrapConfirmNo" id="inventoryScrapConfirmNo">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- Global item tooltip: used by inventory and armory -->
  <div id="inventoryTooltip" class="inventoryItemTooltip hidden"></div>
  </div><!-- /#app -->

  <script src="./src/bloodTypes.js"></script>
  <script src="./src/main.js"></script>
</body>
</html>
